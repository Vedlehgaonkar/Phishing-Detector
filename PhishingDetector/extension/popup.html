<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phishing Detector Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="card">

    <div class="logo">🛡️</div>

    <h1>PHISHING DETECTOR PRO</h1>

    <div class="status-card">
        <h3>Website Status</h3>
        <p id="result">Click Scan</p>
    </div>

    <div class="grid">

        <div class="box">
            <span>Risk Score</span>
            <h2 id="risk">-</h2>
        </div>

        <div class="box">
            <span>Threat Level</span>
            <h2 id="threat">-</h2>
        </div>

    </div>

    <div id="reasons">
        <h3>Detection Reasons</h3>
        <div id="reasonList">
            No scan performed
        </div>
    </div>

    <button id="checkBtn">
        Scan Current Website
    </button>

</div>

<script src="popup.js"></script>

</body>
</html>
